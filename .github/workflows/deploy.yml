name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_SITE_URL: https://everestcharityorg.org
        run: npm run build

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Trailing slashes matter: upload the contents of out/ into public_html/
          local-dir: ./out/
          server-dir: ./public_html/
          # Keep files the build doesn't manage (e.g. ads.txt you upload manually)
          dangerous-clean-slate: false
